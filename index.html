<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Janala</title>
    <!-- favicon-->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">
    <!--Style Sheet added-->
    <link rel="stylesheet" href="style.css" type="text/css">
    <!-- Tailwind & Daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- google font add -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="bg-sky-100 flex justify-between items-center px-8 shadow-md ">
            <div class="left_div">
                <a href="#" class="flex items-center gap-1">
                <span class="poppins font-semibold">English</span>
                <img src="assets/logo.png" alt="icon">
                <span class="poppins font-semibold">Janala</span>
                </a>
            </div>

            <div class="right_div flex justify-center w-[30%] relative items-center">
                <div id="menu" class=" opacity-0 md:opacity-100 absolute md:static top-full right-0 mt-8 md:mt-0 transition-all duration-300 delay-75">
                    <ul  class="flex flex-col md:flex-row gap-6">
                    <li><a href="#" class="border-2 rounded-xl font-semibold px-2 py-1 text-center text-blue-800 items-center hover:bg-sky-600 hover:text-white hover:border-white"><i class="fa-solid fa-circle-question"></i> FAQ</a></li>
                    <li><a href="#" class="border-2 rounded-xl font-semibold px-2 py-1 text-center text-blue-800 items-center hover:bg-sky-600 hover:text-white hover:border-white"><i class="fa-solid fa-book-open"></i> Learn</a></li>
                    <li><a href="#" class="border-2 rounded-xl font-semibold px-2 py-1 text-center text-blue-800 items-center hover:bg-sky-600 hover:text-white hover:border-white"><i class="fa-solid fa-right-from-bracket"></i>LogOut</a></li>
                    </ul>
                </div>
                <div id="hamburger" class="flex flex-col gap-1 cursor-pointer absolute right-0 md:hidden">
                    <div id="bar1" class="bg-sky-800 w-8 h-2 rounded-lg transition-all duration-300 origin-center"></div>
                    <div id="bar2" class="bg-sky-800 w-8 h-2 rounded-lg transition-all duration-300 origin-center"></div>
                    <div id="bar3" class="bg-sky-800 w-8 h-2 rounded-lg transition-all duration-300 origin-center"></div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <!-- Banner section -->
        <section class="banner w-11/12 mx-auto flex flex-col-reverse md:flex-row items-center">
            <div class="bannerInfo text-center md:text-left flex-1">
                <h3 class="font-bold text-5xl mb-4"><span class="text-sky-500 font-bold">English</span> is Easy!!</h3>
                <p class="hind-siliguri mb-4 font-medium text-2xl">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ</p>
                <form action="" class="">
                <input type="text" name="Name" id="Name" class="mb-4"><br>
                <input type="password" name="Password" id="Password" class="mb-4"><br>
                <input type="submit" value="Get Started" class="bg-blue-800 py-2 px-4 rounded text-white font-medium active:shadow-2xl">
                </form>
            </div>
            <div class="bannerImage flex-1">
                <img src="assets/hero-student.png" alt="">
            </div>
        </section>


    </main>

    <!-- JavaScript added -->
    <script src="script.js"></script>
</body>
</html>
